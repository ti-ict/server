name: Build & Push Docker Image to GHCR

# Controls when the workflow will run
on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Define environment variables for the GHCR setup
env:
  REGISTRY: ghcr.io
  # The name of the image on GHCR will be ghcr.io/<owner>/<repo_name>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # Required for writing to the GitHub Container Registry
      packages: write
      # Required for fetching source code
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx (required for modern build features like pushing multi-arch images)
      - name: Set up QEMU and Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate Docker tags and labels
      # This step automatically determines tags like 'latest', 'v1.2.3', or 'commit-sha'
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Uses the GitHub token for authentication
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Assumes your Dockerfile is in the root directory
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use --no-cache when pushing to the main branch for fresh builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}